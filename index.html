<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一2班家长待办任务板</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="badge">琅小柳洲东路一2班 · 语文-王老师</p>
      <h1>家长待办任务网站</h1>
      <p class="subtitle">自动读取最新监控报告，并结构化为可跟进任务。</p>
    </header>

    <section class="panel summary">
      <div class="summary-head">
        <h2>任务总览</h2>
        <span id="reportTime" class="loaded-at">报告时间：--</span>
      </div>
      <div class="metrics">
        <article class="metric-card">
          <p class="metric-label">未完成任务</p>
          <p id="metricPending" class="metric-value">0</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">我已完成</p>
          <p id="metricDone" class="metric-value">0</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">进行中</p>
          <p id="metricDoing" class="metric-value">0</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">临期/逾期</p>
          <p id="metricUrgent" class="metric-value">0</p>
        </article>
      </div>
    </section>

    <section class="panel board">
      <div class="board-head">
        <h2>任务看板（可跟进）</h2>
        <div class="board-actions">
          <label class="filter-wrap">
            <span>筛选</span>
            <select id="taskFilter" class="select-control">
              <option value="all">全部</option>
              <option value="todo">待办</option>
              <option value="doing">进行中</option>
              <option value="done">已完成</option>
            </select>
          </label>
          <button id="copyFollowupBtn" class="btn" type="button">复制跟进清单</button>
        </div>
      </div>
      <div id="taskList" class="task-list">
        <p class="placeholder">正在解析任务...</p>
      </div>
    </section>

    <section class="latest-report">
      <div class="latest-head">
        <h2>最新监控报告（原文）</h2>
        <span id="reportLoadedAt" class="loaded-at">加载中...</span>
      </div>
      <p class="latest-hint">该区域会读取仓库中的 <code>homework_report.md</code>，每次发布后自动更新。</p>
      <details>
        <summary>展开原始报告文本</summary>
        <pre id="latestReportContent" class="latest-report-content">正在加载最新报告...</pre>
      </details>
      <div class="sample-actions">
        <a class="btn btn-plain" href="./homework_report.md" target="_blank" rel="noopener noreferrer">打开报告原文</a>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
