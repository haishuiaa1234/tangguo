<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一2班家长待办任务板</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="badge">琅小柳洲东路一2班 · 语文-王老师</p>
      <h1>家长待办任务网站</h1>
      <p class="subtitle">自动读取最新监控报告，并以原版卡片风格跟进任务。</p>

      <section class="progress-panel">
        <div class="progress-head">
          <strong>当前任务进度</strong>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-foot">
          <span id="progressPercent">0%</span>
          <div class="quick-actions">
            <label class="filter-wrap">
              <span>筛选</span>
              <select id="taskFilter" class="select-control">
                <option value="all">全部</option>
                <option value="todo">待办</option>
                <option value="doing">进行中</option>
                <option value="done">已完成</option>
              </select>
            </label>
            <button id="copyFollowupBtn" class="btn btn-plain" type="button">复制跟进清单</button>
            <button id="resetBtn" class="btn btn-plain" type="button">重置状态</button>
          </div>
        </div>
      </section>
    </header>

    <section class="sprint">
      <h2>优先执行顺序</h2>
      <ol id="priorityList">
        <li>正在分析最新任务...</li>
      </ol>
      <p id="reportTimeLine" class="subtitle">报告时间：--</p>
    </section>

    <section id="taskList" class="grid">
      <p class="placeholder">正在解析任务...</p>
    </section>

    <section class="latest-report">
      <div class="latest-head">
        <h2>最新监控报告（原文）</h2>
        <span id="reportLoadedAt" class="loaded-at">加载中...</span>
      </div>
      <p class="latest-hint">该区域会读取仓库中的 <code>homework_report.md</code>，每次发布后自动更新。</p>
      <details>
        <summary>展开原始报告文本</summary>
        <pre id="latestReportContent" class="latest-report-content">正在加载最新报告...</pre>
      </details>
      <div class="sample-actions">
        <a class="btn btn-plain" href="./homework_report.md" target="_blank" rel="noopener noreferrer">打开报告原文</a>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
